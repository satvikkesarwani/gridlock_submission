<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Gridlock Product Workflow</title>
  <desc id="desc">End-to-end workflow showing user input, frontend form, backend validation, ML prediction, resource recommendation, and live dashboard or debrief output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07131f"/>
      <stop offset="55%" stop-color="#10243b"/>
      <stop offset="100%" stop-color="#18231f"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#172033"/>
      <stop offset="50%" stop-color="#263854"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 13 7 L 1 13 z" fill="#8bd3ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 1 1 L 13 7 L 1 13 z" fill="#4ade80"/>
    </marker>
    <style>
      .title { font: 800 38px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #b9c9d9; letter-spacing: 0; }
      .step { fill: rgba(255,255,255,0.085); stroke: rgba(255,255,255,0.18); stroke-width: 1.4; filter: url(#shadow); }
      .stepTitle { font: 800 20px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .stepText { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #d8e6f2; letter-spacing: 0; }
      .num { font: 900 18px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #06111d; letter-spacing: 0; }
      .small { font: 800 12px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #96adbf; letter-spacing: 0.8px; }
      .arrow { fill: none; stroke: #8bd3ff; stroke-width: 3.5; marker-end: url(#arrow); }
      .arrowGreen { fill: none; stroke: #4ade80; stroke-width: 3.5; marker-end: url(#arrowGreen); }
    </style>
  </defs>

  <rect width="1400" height="760" rx="34" fill="url(#bg)"/>
  <text x="70" y="78" class="title">End-to-End Product Workflow</text>
  <text x="72" y="112" class="subtitle">From event details to ML-backed delay, clearance risk, resources, and dashboard outputs</text>

  <rect x="78" y="364" width="1244" height="98" rx="49" fill="url(#road)" stroke="#314762" stroke-width="1.4"/>
  <line x1="118" y1="413" x2="1282" y2="413" stroke="#f8fafc" stroke-width="4" stroke-dasharray="34 28" opacity="0.34"/>

  <g transform="translate(76 184)">
    <rect width="180" height="190" rx="22" class="step"/>
    <circle cx="36" cy="38" r="22" fill="url(#blue)"/>
    <text x="30" y="45" class="num">1</text>
    <text x="26" y="84" class="stepTitle">User Input</text>
    <text x="26" y="118" class="stepText">Event cause, priority,</text>
    <text x="26" y="140" class="stepText">hour, weekend status,</text>
    <text x="26" y="162" class="stepText">road closure needs</text>
  </g>

  <g transform="translate(294 184)">
    <rect width="180" height="190" rx="22" class="step"/>
    <circle cx="36" cy="38" r="22" fill="url(#blue)"/>
    <text x="30" y="45" class="num">2</text>
    <text x="26" y="84" class="stepTitle">Frontend Form</text>
    <text x="26" y="118" class="stepText">Predictive Simulator</text>
    <text x="26" y="140" class="stepText">packages request for</text>
    <text x="26" y="162" class="stepText">FastAPI endpoints</text>
  </g>

  <g transform="translate(512 184)">
    <rect width="180" height="190" rx="22" class="step"/>
    <circle cx="36" cy="38" r="22" fill="url(#green)"/>
    <text x="30" y="45" class="num">3</text>
    <text x="26" y="84" class="stepTitle">Validation</text>
    <text x="26" y="118" class="stepText">Pydantic schema checks</text>
    <text x="26" y="140" class="stepText">required fields and</text>
    <text x="26" y="162" class="stepText">hour range</text>
  </g>

  <g transform="translate(730 184)">
    <rect width="180" height="190" rx="22" class="step"/>
    <circle cx="36" cy="38" r="22" fill="url(#amber)"/>
    <text x="30" y="45" class="num">4</text>
    <text x="26" y="84" class="stepTitle">ML Prediction</text>
    <text x="26" y="118" class="stepText">Impact model returns</text>
    <text x="26" y="140" class="stepText">delay estimate and</text>
    <text x="26" y="162" class="stepText">clearance range</text>
  </g>

  <g transform="translate(948 184)">
    <rect width="180" height="190" rx="22" class="step"/>
    <circle cx="36" cy="38" r="22" fill="url(#amber)"/>
    <text x="30" y="45" class="num">5</text>
    <text x="26" y="84" class="stepTitle">Resources</text>
    <text x="26" y="118" class="stepText">Recommendation logic</text>
    <text x="26" y="140" class="stepText">estimates staffing,</text>
    <text x="26" y="162" class="stepText">barricades, diversions</text>
  </g>

  <g transform="translate(1166 184)">
    <rect width="180" height="190" rx="22" class="step"/>
    <circle cx="36" cy="38" r="22" fill="url(#green)"/>
    <text x="30" y="45" class="num">6</text>
    <text x="26" y="84" class="stepTitle">Dashboard</text>
    <text x="26" y="118" class="stepText">Simulator, optimizer,</text>
    <text x="26" y="140" class="stepText">live corridor, and</text>
    <text x="26" y="162" class="stepText">debrief views update</text>
  </g>

  <path class="arrow" d="M 256 278 L 292 278"/>
  <path class="arrow" d="M 474 278 L 510 278"/>
  <path class="arrowGreen" d="M 692 278 L 728 278"/>
  <path class="arrowGreen" d="M 910 278 L 946 278"/>
  <path class="arrowGreen" d="M 1128 278 L 1164 278"/>

  <rect x="168" y="528" width="298" height="108" rx="20" fill="rgba(35,184,255,0.10)" stroke="rgba(139,211,255,0.30)"/>
  <text x="198" y="566" class="stepTitle">REST Response</text>
  <text x="198" y="596" class="stepText">Predicted delay, resource plan,</text>
  <text x="198" y="618" class="stepText">clearance risk, and status fields</text>

  <rect x="552" y="528" width="298" height="108" rx="20" fill="rgba(74,222,128,0.10)" stroke="rgba(74,222,128,0.30)"/>
  <text x="582" y="566" class="stepTitle">Live Status Stream</text>
  <text x="582" y="596" class="stepText">Travel-time index, speed,</text>
  <text x="582" y="618" class="stepText">incidents, and clearance forecast</text>

  <rect x="936" y="528" width="298" height="108" rx="20" fill="rgba(253,230,138,0.12)" stroke="rgba(253,230,138,0.34)"/>
  <text x="966" y="566" class="stepTitle">Debrief Analytics</text>
  <text x="966" y="596" class="stepText">Plan-vs-actual metrics, variance,</text>
  <text x="966" y="618" class="stepText">and post-event insights</text>

  <path class="arrow" d="M 1256 374 C 1228 470, 1120 500, 1090 526"/>
  <path class="arrowGreen" d="M 1252 374 C 1130 468, 800 492, 716 526"/>
  <path class="arrow" d="M 1250 374 C 1030 474, 468 490, 328 526"/>

  <text x="70" y="700" class="small">VALIDATED FLOW</text>
  <text x="194" y="700" class="stepText">Frontend input -> backend schema -> ML artifacts -> JSON/WebSocket outputs -> operator-facing dashboards</text>
</svg>
